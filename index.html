<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTG Network</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
}

iframe{
width:100%;
height:100vh;
border:none;
}

.loading{
position:fixed;
top:0;
left:0;
right:0;
background:#111;
padding:10px;
text-align:center;
z-index:9999;
}
</style>
</head>

<body>

<div class="loading">
OTG Network загружается...
</div>

<iframe
src="https://www.otgnetwork.eu">
</iframe>

<script>
window.onload = () => {
setTimeout(() => {
document.querySelector('.loading').style.display='none';
},1500);
};
</script>

</body>
</html>
